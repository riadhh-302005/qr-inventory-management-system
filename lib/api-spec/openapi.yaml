openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Inventory Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product CRUD operations
  - name: dashboard
    description: Dashboard stats and summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by name, productId, or category
        - name: category
          in: query
          schema:
            type: string
          description: Filter by category
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductUpdate"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted successfully
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/by-product-id/{productId}:
    get:
      operationId: getProductByProductId
      tags: [products]
      summary: Get product by productId (for QR code scan)
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/categories:
    get:
      operationId: listCategories
      tags: [products]
      summary: List all unique categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /dashboard/low-stock:
    get:
      operationId: getLowStockProducts
      tags: [dashboard]
      summary: Get products with low stock (quantity <= 5)
      responses:
        "200":
          description: Low stock products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /dashboard/recent:
    get:
      operationId: getRecentProducts
      tags: [dashboard]
      summary: Get recently added or updated products
      responses:
        "200":
          description: Recent products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Product:
      type: object
      required:
        - id
        - name
        - productId
        - category
        - quantity
        - price
        - qrCode
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        name:
          type: string
        productId:
          type: string
          description: Unique product identifier (for QR codes)
        category:
          type: string
        quantity:
          type: integer
        price:
          type: number
        qrCode:
          type: string
          description: QR code data URL (base64 PNG)
        createdAt:
          type: string
        updatedAt:
          type: string

    ProductInput:
      type: object
      required:
        - name
        - category
        - quantity
        - price
      properties:
        name:
          type: string
          minLength: 1
        productId:
          type: ["string", "null"]
          description: Optional custom product ID; auto-generated if omitted
        category:
          type: string
          minLength: 1
        quantity:
          type: integer
          minimum: 0
        price:
          type: number
          minimum: 0

    ProductUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        category:
          type: string
          minLength: 1
        quantity:
          type: integer
          minimum: 0
        price:
          type: number
          minimum: 0

    DashboardStats:
      type: object
      required:
        - totalProducts
        - totalValue
        - lowStockCount
        - categoryCount
        - categoryBreakdown
      properties:
        totalProducts:
          type: integer
        totalValue:
          type: number
        lowStockCount:
          type: integer
        categoryCount:
          type: integer
        categoryBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/CategoryCount"

    CategoryCount:
      type: object
      required:
        - category
        - count
        - totalValue
      properties:
        category:
          type: string
        count:
          type: integer
        totalValue:
          type: number

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
